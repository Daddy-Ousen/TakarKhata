name: khatabook
description: "A production-quality, offline-first personal finance ledger application."
publish_to: 'none'
version: 1.0.4+4

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  equatable: ^2.0.7
  json_annotation: ^4.9.0



  # File handling
  file_picker: ^8.1.7
  share_plus: ^10.1.4

  # Routing
  go_router: ^14.8.1

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.2
  json_serializable: ^6.9.3
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.23

flutter_launcher_icons:
  android: true
  ios: false
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
  image_path: "assets/icon/app_icon.png"
